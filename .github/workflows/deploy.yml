name: Deploy FastAPI to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          debug: true
          script: |
            set -e   # stop on error

            echo "🚀 Starting deployment..."

            cd /home/ubuntu/fastapi/git_practice

            echo "📥 Fetching latest code..."
            git fetch origin

            echo "🔄 Resetting to latest commit..."
            git reset --hard origin/main

            echo "🧹 Cleaning unwanted files..."
            git clean -fd

            echo "🐍 Activating virtual environment..."
            source /home/ubuntu/fastapi/venv/bin/activate

            echo "📦 Installing dependencies..."
            pip install --upgrade pip
            pip install -r requirements.txt

            echo "🛑 Killing old process on port 8000..."
            fuser -k 8000/tcp || true

            echo "⏳ Waiting for port to free..."
            sleep 2

            echo "▶️ Starting FastAPI app..."
            nohup uvicorn main:app --host 0.0.0.0 --port 8000 > app.log 2>&1 &

            echo "✅ Deployment completed!"

            echo "📌 Running process check:"
            ps aux | grep uvicorn